<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Juego 3D Mejorado</title>

<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>

<style>
html, body {
    width: 100%;
    height: 100%;
    margin: 0;
    overflow: hidden;
}
canvas {
    width: 100%;
    height: 100%;
}
</style>
</head>

<body>

<canvas id="renderCanvas"></canvas>

<script>
const canvas = document.getElementById("renderCanvas");
const engine = new BABYLON.Engine(canvas, true);

const createScene = async function () {
    const scene = new BABYLON.Scene(engine);

    // Cámara libre (tipo juego)
    const camera = new BABYLON.FreeCamera(
        "camera",
        new BABYLON.Vector3(0, 3, -10),
        scene
    );
    camera.setTarget(BABYLON.Vector3.Zero());
    camera.attachControl(canvas, true);

    // Luz
    new BABYLON.HemisphericLight("light", new BABYLON.Vector3(0,1,0), scene);

    // 🌍 TERRENO GRANDE
    const ground = BABYLON.MeshBuilder.CreateGround("ground", {
        width: 200,
        height: 200
    }, scene);

    // 🌳 ÁRBOLES (simples pero muchos)
    function createTree(x, z) {
        // tronco
        const trunk = BABYLON.MeshBuilder.CreateCylinder("trunk", {
            height: 2,
            diameter: 0.5
        }, scene);
        trunk.position = new BABYLON.Vector3(x, 1, z);

        // hojas
        const leaves = BABYLON.MeshBuilder.CreateSphere("leaves", {
            diameter: 2
        }, scene);
        leaves.position = new BABYLON.Vector3(x, 2.5, z);
    }

    for (let i = 0; i < 50; i++) {
        createTree(
            Math.random() * 100 - 50,
            Math.random() * 100 - 50
        );
    }

    // 🧍 PERSONAJE 3D (modelo real)
    await BABYLON.SceneLoader.ImportMesh(
        "",
        "https://models.babylonjs.com/",
        "BoomBox.glb", // modelo de prueba (luego puedes cambiarlo)
        scene,
        function (meshes) {
            const character = meshes[0];
            character.position = new BABYLON.Vector3(0, 0, 0);
        }
    );

    return scene;
};

createScene().then(scene => {
    engine.runRenderLoop(() => {
        scene.render();
    });
});

window.addEventListener("resize", () => {
    engine.resize();
});
</script>

</body>
</html>
